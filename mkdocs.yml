site_name: gitsheets
site_description: A git-backed document store for low-volume, high-touch, human-scale data
site_author: Jarvus Innovations
copyright: Apache-2.0 — Jarvus Innovations
repo_url: https://github.com/JarvusInnovations/gitsheets
edit_uri: edit/develop/docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.action.edit
  palette:
    primary: "orange"
    accent: "deep purple"

nav:
  - Home: README.md
  - Quick start: quick-start.md
  - Concepts: concepts.md
  - Guides:
      - Path templates: path-templates.md
      - Validation: validation.md
      - CLI: cli.md
      - API reference: api.md
      - gitsheets-axi (agent CLI): axi.md
  - Recipes:
      - Typed sheet with Zod: recipes/typed-sheet-with-zod.md
      - Request-bound transactions: recipes/request-bound-transactions.md
      - Secondary indices: recipes/secondary-indices.md
      - Production push daemon: recipes/production-push-daemon.md
      - Markdown CMS pattern: recipes/markdown-cms.md
      - Migrating a fields config: recipes/migrating-config.md
  - Migration guide: migration-guide.md

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@8.5.0/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - codehilite:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: '!!python/name:pymdownx.superfences.fence_div_format'
  - pymdownx.smartsymbols
  - meta
  - toc:
      permalink: " ¶"
  - smarty
  - mdx_truly_sane_lists
