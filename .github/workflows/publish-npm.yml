name: Publish npm package

on:
  push:
    tags: ['v*']

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install npm via corepack (bypasses broken bundled npm in current Node 22 toolcache)
        run: |
          corepack enable
          corepack install --global npm@latest
          npm --version

      - name: Set package.json version from tag
        run: |
          set -e
          SOURCE_TAG="${GITHUB_REF#refs/tags/}"
          npm version --no-git-tag-version "${SOURCE_TAG#v}"

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - run: npm publish --provenance --access public
